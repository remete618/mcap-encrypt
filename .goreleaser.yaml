version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: mcap-encrypt
    main: ./cmd/mcap-encrypt
    binary: mcap-encrypt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  draft: false
  prerelease: auto
  header: |
    See [CHANGELOG.md](https://github.com/remete618/mcap-encrypt/blob/main/CHANGELOG.md) for details.

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
