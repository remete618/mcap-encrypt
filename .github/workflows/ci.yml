name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (with race detector)
        run: go test -race -count=1 ./...

      - name: Build
        run: go build ./...

      - name: Staticcheck
        uses: dominikh/staticcheck-action@9716614d4101e79b4340dd97b10e54d68234e431 # v1
        with:
          version: "latest"

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ts/package-lock.json

      - name: Install
        run: cd ts && npm ci

      - name: Type check
        run: cd ts && npm run typecheck

      - name: Audit
        run: cd ts && npm audit --audit-level=high

      - name: Test
        run: cd ts && npm test

  browser:
    name: Browser smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ts/package-lock.json

      - name: Install
        run: cd ts && npm ci

      - name: Install Playwright browsers
        run: cd ts && npx playwright install --with-deps chromium

      - name: Browser smoke test
        run: cd ts && npm run test:browser

  interop:
    name: Cross-language interop
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "go.mod"
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ts/package-lock.json

      - name: Install
        run: cd ts && npm ci

      - name: Build TypeScript
        run: cd ts && npm run build

      - name: Interop tests (Go ↔ TypeScript)
        run: cd ts && npm run test:interop

  python:
    name: Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go binary (enables interop tests)
        run: go build -o "$HOME/go/bin/mcap-encrypt" ./cmd/mcap-encrypt

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8
        with:
          enable-cache: true
          cache-dependency-glob: "py/uv.lock"

      - name: Test
        run: cd py && uv sync --extra dev && uv run python -m pytest -v

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Fuzz parser surface
        # -timeout is set well above -fuzztime so the cleanup phase has time
        # to write coverage data without hitting "context deadline exceeded"
        # at the boundary; the Go fuzz harness occasionally reports the
        # deadline as a FAIL even when no finding was triggered.
        run: |
          for t in FuzzDecodeEncryptedChunk FuzzDecodeEncryptedAttachment FuzzDecodeWrappedKeyData FuzzStreamDecrypt; do
            echo "== $t =="
            go test -run='^$' -fuzz="^${t}$" -fuzztime=30s -timeout=2m ./pkg/mcapencrypt
          done
