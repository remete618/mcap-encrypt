name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write      # required for artifact attestation
  attestations: write  # required for artifact attestation

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: sigstore/cosign-installer@v3

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Attest build artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/mcap-encrypt_*.tar.gz
            dist/mcap-encrypt_*.zip
            dist/checksums.txt

      - name: SBOM — Go
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          artifact-name: sbom-go.spdx.json
          upload-release-assets: true

      - name: SBOM — npm
        uses: anchore/sbom-action@v0
        with:
          path: ts
          format: spdx-json
          artifact-name: sbom-npm.spdx.json
          upload-release-assets: true
