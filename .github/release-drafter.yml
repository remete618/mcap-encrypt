name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Breaking Changes"
    labels: [breaking]
  - title: "New Features"
    labels: [feature, enhancement]
  - title: "Bug Fixes"
    labels: [bug, fix]
  - title: "Security"
    labels: [security]
  - title: "Performance"
    labels: [performance]
  - title: "Documentation"
    labels: [documentation, docs]
  - title: "Maintenance"
    labels: [chore, ci, dependencies]

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: [breaking]
  minor:
    labels: [feature, enhancement]
  patch:
    labels: [bug, fix, security, performance, documentation, docs, chore, ci, dependencies]
  default: patch

template: |
  ## What's changed

  $CHANGES

  **Full changelog:** $PREVIOUS_TAG...v$RESOLVED_VERSION
